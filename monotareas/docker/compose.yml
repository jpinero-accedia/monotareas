services:
  mariadb-service:
    image: mariadb:12.3.2-noble
    container_name: mariadb-container
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: secret
      MARIADB_DATABASE: tareasdb
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
  express-server-service:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: dev
    container_name: express-dev-container
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./app:/app
      - express-node-modules:/app/node_modules
      - express-yarn:/app/.yarn
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: true

volumes:
  express-node-modules:
    name: express-dev-node-modules
  express-yarn:
    name: express-dev-yarn-cache
  db-data:
    name: mariadb-data

